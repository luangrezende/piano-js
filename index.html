<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Piano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="rotate-notice">
    <div class="rotate-phone"></div>
    <span class="rotate-text">Gire o dispositivo</span>
  </div>

  <div class="content-wrapper">
    <div class="note-display" id="noteDisplay">&nbsp;</div>

    <div class="piano-case">
      <div class="brand">Celina</div>
      <div class="piano-keys" id="piano"></div>
    </div>

    <div class="hint">clique ou teclado &nbsp;·&nbsp; A–J = C4–B4 &nbsp;·&nbsp; K–; = C5–E5</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
