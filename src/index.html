<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Piano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <div class="song-selector">
    <select id="song-select">
      <option value="/songs/song1.json">Carol Of The Bells</option>
      <option value="/songs/song2.json">Married Life</option>
    </select>
    <button id="play-btn">&#9654; Tocar</button>
  </div>

  <div class="rotate-notice">
    <div class="rotate-phone"></div>
    <span class="rotate-text">Gire o dispositivo</span>
  </div>

  <div class="content-wrapper">
    <div class="note-display" id="noteDisplay">&nbsp;</div>

    <div class="piano-case">
      <div class="brand">Celina</div>
      <div class="piano-keys" id="piano"></div>
      <span class="signature">by Luan Gomes</span>

    </div>
    <div class="hint">
      Clique ou use o teclado.
    </div>

  <script src="/src/script.js"></script>
</body>
</html>
