<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Virtual Piano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="layout-selector pill-selector">
      <button class="pill-selector__btn layout-selector__btn active" data-layout="classic">classic</button>
      <button class="pill-selector__btn layout-selector__btn" data-layout="clean">clean</button>
    </div>

    <div class="label-toggle pill-selector">
      <button class="pill-selector__btn label-toggle__btn active" id="toggle-keys">keys</button>
      <button class="pill-selector__btn label-toggle__btn" id="toggle-notes">notes</button>
    </div>

    <div class="song-selector">
      <select id="song-list"></select>
      <button id="play-btn">
        <span id="play-icon">&#9654;</span>
      </button>
    </div>

    <div id="piano-wrapper" class="content-wrapper">
      <div class="piano-case">
        <div class="brand" id="piano-brand"></div>
        <div class="piano-keys" id="piano"></div>
        <span class="signature" id="piano-signature"></span>
      </div>
      <div class="hint">
        Clique ou use o teclado.
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
